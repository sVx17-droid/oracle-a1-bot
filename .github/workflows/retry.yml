name: Oracle A1 Batam Retry

on:
  schedule:
    - cron: '*/15 * * * *'  # tiap 15 menit
  workflow_dispatch:

concurrency:
  group: oracle-retry
  cancel-in-progress: true

jobs:
  try-create-instance:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Cache OCI CLI
        id: cache-oci
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-oci-cli-v2

      - name: Setup OCI CLI
        run: |
          if [ "${{ steps.cache-oci.outputs.cache-hit }}" != "true" ]; then
            pip install oci-cli --quiet
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          mkdir -p ~/.oci ~/.ssh
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_CLI_USER }}
          tenancy=${{ secrets.OCI_CLI_TENANCY }}
          fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
          key_file=~/.oci/oci_api_key.pem
          region=ap-batam-1
          EOF

          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub

      - name: Cek instance A1 sudah ada
        id: check
        run: |
          EXISTING=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --lifecycle-state RUNNING \
            --auth api_key \
            --no-retry 2>&1 || true)
          if echo "$EXISTING" | grep -q "A1.Flex"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Instance sudah ada — nonaktifkan workflow
        if: steps.check.outputs.exists == 'true'
        run: |
          MSG="✅ Oracle A1 Batam sudah RUNNING!%0AWorkflow dihentikan otomatis.%0AWaktu: $(date '+%Y-%m-%d %H:%M UTC')"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MSG"
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/retry.yml/disable"

      - name: Coba buat instance A1
        id: launch
        if: steps.check.outputs.exists == 'false'
        run: |
          # Parallel arrays — hindari cut -d: yang memotong JSON
          LABELS=("4cpu-auto" "4cpu-fd1" "4cpu-fd2" "4cpu-fd3"
                  "2cpu-auto" "2cpu-fd1" "2cpu-fd2" "2cpu-fd3"
                  "1cpu-auto" "1cpu-fd1" "1cpu-fd2" "1cpu-fd3")
          OCPUS=(4  4  4  4  2  2  2  2  1  1  1  1)
          MEMS=(24 24 24 24 12 12 12 12  6  6  6  6)
          FDS=(""             "FAULT-DOMAIN-1" "FAULT-DOMAIN-2" "FAULT-DOMAIN-3"
               ""             "FAULT-DOMAIN-1" "FAULT-DOMAIN-2" "FAULT-DOMAIN-3"
               ""             "FAULT-DOMAIN-1" "FAULT-DOMAIN-2" "FAULT-DOMAIN-3")

          SUCCESS=false
          for i in "${!LABELS[@]}"; do
            LABEL="${LABELS[$i]}"
            OCPU="${OCPUS[$i]}"
            MEM="${MEMS[$i]}"
            FD="${FDS[$i]}"
            NAME="batam-gh-$(date +%m%d%H%M)-$$"

            echo "Mencoba $LABEL (${OCPU} OCPU, ${MEM}GB) → $NAME"

            # Gunakan bash array agar quoting JSON aman (tidak pakai string + eval)
            OCI_ARGS=(
              compute instance launch
              --availability-domain "GsbX:AP-BATAM-1-AD-1"
              --compartment-id "${{ secrets.OCI_TENANCY_OCID }}"
              --shape "VM.Standard.A1.Flex"
              --shape-config "{\"ocpus\":${OCPU},\"memoryInGBs\":${MEM}}"
              --image-id "ocid1.image.oc1.ap-batam-1.aaaaaaaansnq2iiriekoejkn2ktdnl5s553mj3yrqgnib3z77suae3v6ypfq"
              --subnet-id "ocid1.subnet.oc1.ap-batam-1.aaaaaaaajpdq76idwvc77ciys7go33rpm2ulqdmwsk2v5c66oc2kw45pllva"
              --assign-public-ip true
              --ssh-authorized-keys-file ~/.ssh/id_rsa.pub
              --display-name "$NAME"
              --auth api_key
              --no-retry
            )

            if [ -n "$FD" ]; then
              OCI_ARGS+=(--fault-domain "$FD")
            fi

            RESULT=$(oci "${OCI_ARGS[@]}" 2>&1 || true)

            if echo "$RESULT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
              echo "BERHASIL dengan $LABEL!"
              echo "success=true" >> $GITHUB_OUTPUT
              echo "label=$LABEL" >> $GITHUB_OUTPUT
              echo "name=$NAME" >> $GITHUB_OUTPUT
              SUCCESS=true
              break
            elif echo "$RESULT" | grep -qi "LimitExceeded\|limit_exceeded"; then
              echo "LimitExceeded — instance mungkin sudah ada (stopped/starting)."
              echo "success=limit" >> $GITHUB_OUTPUT
              SUCCESS=true
              break
            else
              ERR=$(echo "$RESULT" | grep -oE '"message": "[^"]*"' | head -1 || echo "(no message)")
              echo "Gagal ($LABEL): $ERR"
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Kirim notifikasi Telegram (berhasil)
        if: steps.launch.outputs.success == 'true'
        run: |
          MSG="🎉 Oracle A1 Batam BERHASIL!%0AInstance: ${{ steps.launch.outputs.name }}%0AShape: ${{ steps.launch.outputs.label }}%0AWaktu: $(date '+%Y-%m-%d %H:%M UTC')"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MSG"

      - name: Nonaktifkan workflow setelah berhasil
        if: steps.launch.outputs.success == 'true' || steps.launch.outputs.success == 'limit'
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/retry.yml/disable"

      - name: Kirim notifikasi semua strategi gagal
        if: steps.launch.outputs.success == 'false'
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=⏳ A1 Batam masih penuh — semua 12 strategi gagal. Waktu: $(date '+%Y-%m-%d %H:%M UTC'). Bot tetap retry tiap 15 menit."

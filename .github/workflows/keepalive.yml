name: Keepalive

on:
  schedule:
    - cron: '0 0 1 * *'   # sekali sebulan — cegah GitHub disable workflow

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          github_token: ${{ secrets.GH_PAT }}
